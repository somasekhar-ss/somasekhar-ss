<svg width="1000" height="340" viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #070B12; }
      .grid-line { stroke: #12233A; stroke-width: 1; opacity: 0.5; }

      .top-border {
        stroke: #2EA8FF; stroke-width: 1.8; fill: none;
        stroke-dasharray: 1000; stroke-dashoffset: 1000;
        animation: draw 1.6s ease forwards;
      }
      .side-line { stroke: #173248; stroke-width: 1; }

      .corner { fill: none; stroke: #2EA8FF; stroke-width: 1.5; opacity: 0.9; }

      .sidebar-label {
        font-family: 'Courier New', Consolas, monospace; font-size: 11px;
        fill: #4C7691; letter-spacing: 2.5px;
      }
      .sidebar-value {
        font-family: 'Courier New', Consolas, monospace; font-size: 13px;
        fill: #73CFFF; letter-spacing: 1px;
      }

      .sys-tag {
        font-family: 'Courier New', Consolas, monospace; font-size: 14px;
        fill: #4C7691; letter-spacing: 6px;
        opacity: 0; animation: fade-in 0.6s 0.4s ease forwards;
      }
      .name {
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; font-size: 56px; font-weight: 700;
        fill: #E6EDF3; letter-spacing: 6px;
        opacity: 0; animation: fade-up 0.7s 0.6s ease forwards;
      }
      .role {
        font-family: 'Courier New', Consolas, monospace; font-size: 19px;
        fill: #2EA8FF; letter-spacing: 4px;
        opacity: 0; animation: fade-up 0.7s 0.85s ease forwards;
      }
      .stack {
        font-family: 'Courier New', Consolas, monospace; font-size: 15.5px;
        fill: #8FA8BA; letter-spacing: 1.5px;
        opacity: 0; animation: fade-up 0.7s 1.05s ease forwards;
      }
      .tagline {
        font-family: 'Courier New', Consolas, monospace; font-size: 14px;
        fill: #5E7A8C;
        opacity: 0; animation: fade-in 0.8s 1.3s ease forwards;
      }

      .prompt {
        font-family: 'Courier New', Consolas, monospace; font-size: 15px;
        fill: #2EA8FF;
        opacity: 0; animation: fade-in 0.6s 1.6s ease forwards;
      }
      .cursor {
        fill: #2EA8FF;
        opacity: 0;
        animation: fade-in 0.2s 1.6s ease forwards, blink 1.1s 1.8s steps(1) infinite;
      }

      .pulse-dot { fill: #2EA8FF; animation: pulse 2.4s ease-in-out infinite; }

      .scan {
        fill: url(#scanGradient);
        opacity: 0;
        animation: scan 5.5s 1.8s linear infinite;
      }

      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes fade-in { to { opacity: 1; } }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.35; r: 3; }
        50% { opacity: 1; r: 5; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes scan {
        0% { opacity: 0; transform: translateY(0); }
        8% { opacity: 0.5; }
        45% { opacity: 0.5; }
        55% { opacity: 0; }
        100% { opacity: 0; transform: translateY(340px); }
      }
    </style>

    <linearGradient id="scanGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2EA8FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2EA8FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2EA8FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="340" class="bg"/>

  <!-- Faint blueprint grid -->
  <g class="grid-line">
    <line x1="0" y1="86" x2="1000" y2="86"/>
    <line x1="0" y1="256" x2="1000" y2="256"/>
    <line x1="170" y1="0" x2="170" y2="340"/>
    <line x1="340" y1="0" x2="340" y2="340" opacity="0.3"/>
    <line x1="670" y1="0" x2="670" y2="340" opacity="0.3"/>
    <line x1="840" y1="0" x2="840" y2="340" opacity="0.3"/>
  </g>

  <!-- Scan line sweep -->
  <rect x="0" y="0" width="1000" height="22" class="scan"/>

  <!-- Animated top border -->
  <line x1="0" y1="2" x2="1000" y2="2" class="top-border"/>

  <!-- Corner accents -->
  <polyline points="22,32 22,12 40,12" class="corner"/>
  <polyline points="978,32 978,12 960,12" class="corner"/>
  <polyline points="22,308 22,328 40,328" class="corner"/>
  <polyline points="978,308 978,328 960,328" class="corner"/>

  <!-- Sidebar divider -->
  <line x1="170" y1="28" x2="170" y2="312" class="side-line"/>

  <!-- Sidebar content -->
  <circle cx="32" cy="50" r="3" class="pulse-dot"/>
  <text x="46" y="55" class="sidebar-label">SYSTEM</text>

  <text x="24" y="96" class="sidebar-label">STATUS</text>
  <text x="24" y="116" class="sidebar-value">ACTIVE</text>

  <text x="24" y="150" class="sidebar-label">BUILD</text>
  <text x="24" y="170" class="sidebar-value">CONTINUOUS</text>

  <text x="24" y="204" class="sidebar-label">FOCUS</text>
  <text x="24" y="224" class="sidebar-value">BACKEND</text>

  <text x="24" y="258" class="sidebar-label">VERSION</text>
  <text x="24" y="278" class="sidebar-value">2026.1</text>

  <!-- Main content -->
  <text x="205" y="62" class="sys-tag">SYSTEM INITIALIZED</text>

  <text x="203" y="132" class="name">SOMA SEKHAR</text>

  <text x="206" y="164" class="role">JAVA BACKEND ENGINEER</text>

  <text x="206" y="193" class="stack">Spring Boot · React · AWS · REST APIs</text>

  <text x="206" y="226" class="tagline">Building scalable backend systems through</text>
  <text x="206" y="246" class="tagline">clean architecture and continuous learning.</text>

  <!-- Bottom divider -->
  <line x1="170" y1="282" x2="978" y2="282" class="side-line"/>

  <!-- Terminal prompt -->
  <text x="206" y="309" class="prompt" textLength="150" lengthAdjust="spacingAndGlyphs">&gt; system.ready</text>
  <rect x="362" y="296" width="9" height="16" class="cursor"/>
</svg>
