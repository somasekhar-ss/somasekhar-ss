<svg width="900" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #070b12; }
      .panel { fill: #090f1a; stroke: #0e2235; stroke-width: 1; }
      .label { font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 9px; letter-spacing: 4px; fill: #1a4a6a; }
      .stat-name { font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px; fill: #2e6a8a; letter-spacing: 1px; }
      .stat-val { font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 10px; fill: #1e5070; }
      .bar-bg { fill: #0a1420; }
      .bar-fill-88 { fill: #1e6b9c;
        width: 0; animation: grow-88 1.2s 0.4s ease forwards; }
      .bar-fill-76 { fill: #1e6b9c;
        width: 0; animation: grow-76 1.2s 0.55s ease forwards; }
      .bar-fill-82 { fill: #1e6b9c;
        width: 0; animation: grow-82 1.2s 0.7s ease forwards; }
      .bar-fill-85 { fill: #1e6b9c;
        width: 0; animation: grow-85 1.2s 0.85s ease forwards; }
      .bar-fill-78 { fill: #1e6b9c;
        width: 0; animation: grow-78 1.2s 1.0s ease forwards; }
      .bar-fill-91 { fill: #5ab4d4;
        width: 0; animation: grow-91 1.2s 1.15s ease forwards; }
      .diamond { fill: #5ab4d4; opacity: 0; }
      .diamond-88 { fill: #5ab4d4; animation: diamond-show 0.3s 1.65s ease forwards; }
      .diamond-76 { fill: #5ab4d4; animation: diamond-show 0.3s 1.8s ease forwards; }
      .diamond-82 { fill: #5ab4d4; animation: diamond-show 0.3s 1.95s ease forwards; }
      .diamond-85 { fill: #5ab4d4; animation: diamond-show 0.3s 2.1s ease forwards; }
      .diamond-78 { fill: #5ab4d4; animation: diamond-show 0.3s 2.25s ease forwards; }
      .diamond-91 { fill: #5ab4d4; animation: diamond-show 0.3s 2.4s ease forwards; }
      .section-title { font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px; fill: #e2eaf0; letter-spacing: 2px; }
      .corner { fill: none; stroke: #1e6b9c; stroke-width: 1; }
      .divider { stroke: #0e2235; stroke-width: 1; }
      .val-highlight { font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 10px; fill: #5ab4d4; }

      @keyframes grow-88 { to { width: 396px; } }
      @keyframes grow-76 { to { width: 342px; } }
      @keyframes grow-82 { to { width: 369px; } }
      @keyframes grow-85 { to { width: 382px; } }
      @keyframes grow-78 { to { width: 351px; } }
      @keyframes grow-91 { to { width: 409px; } }
      @keyframes diamond-show { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="900" height="320" class="bg"/>
  <rect x="20" y="20" width="860" height="280" rx="2" class="panel"/>

  <!-- Corner accents -->
  <polyline points="20,38 20,20 38,20" class="corner"/>
  <polyline points="862,38 862,20 844,20" class="corner"/>
  <polyline points="20,282 20,300 38,300" class="corner"/>
  <polyline points="862,282 862,300 844,300" class="corner"/>

  <!-- Section label -->
  <text x="40" y="48" class="label">[ 03 · ABILITY STATS ]</text>
  <line x1="40" y1="58" x2="860" y2="58" class="divider"/>

  <!-- Row 1: PROBLEM SOLVING -->
  <text x="50" y="89" class="stat-name">PROBLEM SOLVING</text>
  <rect x="220" y="80" width="450" height="3" class="bar-bg"/>
  <rect x="220" y="80" height="3" class="bar-fill-91"/>
  <polygon points="630,76.5 634,80 630,83.5 626,80" class="diamond-91" opacity="0"/>
  <text x="648" y="86" class="val-highlight">91</text>
  <text x="668" y="86" class="stat-val">/ 100</text>

  <!-- Row 2: JAVA -->
  <text x="50" y="122" class="stat-name">JAVA · SPRING BOOT</text>
  <rect x="220" y="113" width="450" height="3" class="bar-bg"/>
  <rect x="220" y="113" height="3" class="bar-fill-88"/>
  <polygon points="617,109.5 621,113 617,116.5 613,113" class="diamond-88" opacity="0"/>
  <text x="648" y="119" class="stat-val">88</text>
  <text x="668" y="119" class="stat-val">/ 100</text>

  <!-- Row 3: REST API -->
  <text x="50" y="155" class="stat-name">REST API DESIGN</text>
  <rect x="220" y="146" width="450" height="3" class="bar-bg"/>
  <rect x="220" y="146" height="3" class="bar-fill-85"/>
  <polygon points="603,142.5 607,146 603,149.5 599,146" class="diamond-85" opacity="0"/>
  <text x="648" y="152" class="stat-val">85</text>
  <text x="668" y="152" class="stat-val">/ 100</text>

  <!-- Row 4: DSA -->
  <text x="50" y="188" class="stat-name">DATA STRUCTURES</text>
  <rect x="220" y="179" width="450" height="3" class="bar-bg"/>
  <rect x="220" y="179" height="3" class="bar-fill-82"/>
  <polygon points="589,175.5 593,179 589,182.5 585,179" class="diamond-82" opacity="0"/>
  <text x="648" y="185" class="stat-val">82</text>
  <text x="668" y="185" class="stat-val">/ 100</text>

  <!-- Row 5: SQL -->
  <text x="50" y="221" class="stat-name">SQL · DATABASES</text>
  <rect x="220" y="212" width="450" height="3" class="bar-bg"/>
  <rect x="220" y="212" height="3" class="bar-fill-78"/>
  <polygon points="572,208.5 576,212 572,215.5 568,212" class="diamond-78" opacity="0"/>
  <text x="648" y="218" class="stat-val">78</text>
  <text x="668" y="218" class="stat-val">/ 100</text>

  <!-- Row 6: REACT -->
  <text x="50" y="254" class="stat-name">REACT · FRONTEND</text>
  <rect x="220" y="245" width="450" height="3" class="bar-bg"/>
  <rect x="220" y="245" height="3" class="bar-fill-76"/>
  <polygon points="562,241.5 566,245 562,248.5 558,245" class="diamond-76" opacity="0"/>
  <text x="648" y="251" class="stat-val">76</text>
  <text x="668" y="251" class="stat-val">/ 100</text>

  <!-- Right side decorative scale -->
  <line x1="730" y1="65" x2="730" y2="295" stroke="#0e2235" stroke-width="0.5"/>
  <text x="750" y="80" class="label" opacity="0.5">MAX</text>
  <text x="750" y="175" class="label" opacity="0.5">MID</text>
  <text x="750" y="295" class="label" opacity="0.5">MIN</text>
</svg>
