<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
      .bg{fill:#070b12;}
      .grid{stroke:#0e2235;stroke-width:.6;opacity:.35}
      .title{font:11px 'Share Tech Mono',monospace;fill:#5ab4d4;letter-spacing:4px}
      .name{font:bold 46px 'Share Tech Mono',monospace;fill:#e6edf3;letter-spacing:5px}
      .role{font:15px 'Share Tech Mono',monospace;fill:#1e6b9c;letter-spacing:2px}
      .desc{font:12px 'Share Tech Mono',monospace;fill:#8ba3b7}
      .small{font:10px 'Share Tech Mono',monospace;fill:#5ab4d4;letter-spacing:2px}
      .border{fill:none;stroke:#1e6b9c;stroke-width:1.5;stroke-dasharray:2400;stroke-dashoffset:2400;
      animation:draw 2s ease forwards;}
      .scan{fill:#5ab4d4;opacity:.05;animation:scan 4s linear infinite;}
      .dot{fill:#1e6b9c;animation:pulse 2s ease-in-out infinite;}
      @keyframes draw{to{stroke-dashoffset:0}}
      @keyframes pulse{50%{opacity:.3}100%{opacity:1}}
      @keyframes scan{
        0%{transform:translateY(-10px)}
        100%{transform:translateY(310px)}
      }
    </style>
  </defs>

  <rect class="bg" width="900" height="300"/>

  <!-- grid -->
  <g>
    <line class="grid" x1="0" y1="60" x2="900" y2="60"/>
    <line class="grid" x1="0" y1="120" x2="900" y2="120"/>
    <line class="grid" x1="0" y1="180" x2="900" y2="180"/>
    <line class="grid" x1="0" y1="240" x2="900" y2="240"/>
    <line class="grid" x1="150" y1="0" x2="150" y2="300"/>
    <line class="grid" x1="300" y1="0" x2="300" y2="300"/>
    <line class="grid" x1="450" y1="0" x2="450" y2="300"/>
    <line class="grid" x1="600" y1="0" x2="600" y2="300"/>
    <line class="grid" x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <rect class="border" x="10" y="10" width="880" height="280"/>

  <!-- corners -->
  <path d="M10 30V10H30M890 30V10H870M10 270V290H30M890 270V290H870"
        fill="none" stroke="#5ab4d4" stroke-width="2"/>

  <rect class="scan" x="0" y="0" width="900" height="2"/>

  <circle class="dot" cx="40" cy="35" r="3"/>
  <circle class="dot" cx="52" cy="35" r="3"/>
  <circle class="dot" cx="64" cy="35" r="3"/>

  <text x="450" y="60" text-anchor="middle" class="title">// SOFTWARE ENGINEERING PORTFOLIO</text>

  <text x="450" y="135" text-anchor="middle" class="name">MADDINENI SOMA SEKHAR</text>

  <text x="450" y="170" text-anchor="middle" class="role">
    JAVA FULL-STACK DEVELOPER
  </text>

  <text x="450" y="195" text-anchor="middle" class="desc">
    Spring Boot • React • AWS • Backend Engineering
  </text>

  <text x="450" y="220" text-anchor="middle" class="desc">
    Building reliable software through continuous learning and real-world projects.
  </text>

  <line x1="180" y1="245" x2="720" y2="245" stroke="#0e2235"/>

  <text x="140" y="270" class="small">|STATUS|  --ACTIVE</text>
  <text x="360" y="270" class="small">|LOCATION|  --INDIA</text>
  <text x="590" y="270" class="small">|FOCUS|  --JAVA FULL STACK</text>
  <text x="760" y="270" class="small">|UPDATED|  --2026</text>
</svg>
